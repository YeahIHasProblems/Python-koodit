<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Testing JavaScript</title>
</head>
<body>
<h1></h1>
<p id="target"></p>
<script>
    'use strict';
    const name = prompt('What is your name?');
    const number = Math.floor(Math.random() * 4);
    let house = '';
    if (number === 1) {
        house = 'Gryffindor';
    } else if (number === 2) {
        house = 'Slytherin';
    } else if (number === 3) {
        house = 'Ravenclaw';
    } else if (number === 4) {
        house = 'Hufflepuff';
    }
    document.querySelector('#target').innerHTML = name +', you are '+ house;
</script>
</body>
</html>
