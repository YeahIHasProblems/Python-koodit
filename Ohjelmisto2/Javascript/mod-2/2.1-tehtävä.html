<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Testing JavaScript</title>
</head>
<body>
<h1></h1>
<p id="target"></p>
<script>
    'use strict';
    const numbers = [];
    for (let i = 0; i < 5; i++) {
        const input = prompt('Enter number:');
        numbers.push(Number(input));
    }
    let numbers2 = [];
        for (var i = numbers.length - 1; i >= 0; i--) {
        numbers2.push(numbers[i]);
    }
    console.log(numbers2);
    document.querySelector('#target').innerHTML ='Vastaus on console logissa';
</script>
</body>
</html>
